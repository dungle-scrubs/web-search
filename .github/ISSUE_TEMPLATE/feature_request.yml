name: Feature request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? Is there a use case it unblocks?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would the feature look like? API surface, CLI flags, behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using now, or alternative approaches you've thought through.
